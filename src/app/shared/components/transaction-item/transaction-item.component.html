<ion-item (click)="onItemClick()" button detail="false">
  <ion-avatar slot="start">
    <div class="category-icon-container" [style.background-color]="'var(--ion-color-' + (transaccion.category | categoryColor) + '-tint)'">
      <ion-icon [name]="transaccion.category | categoryIcon" [color]="transaccion.category | categoryColor"></ion-icon>
    </div>
  </ion-avatar>

  <ion-label>
    <h2 class="ion-text-capitalize">{{ transaccion.category }}</h2>
    <p>{{ transaccion.description || 'Sin descripción' }}</p>
    <ion-note color="medium">{{ transaccion.date | dateFormat }}</ion-note>
  </ion-label>

  <ion-note slot="end" [color]="transaccion.type === 'income' ? 'success' : 'danger'" class="amount-text">
    {{ transaccion.type === 'income' ? '+' : '-' }} {{ transaccion.amount | currencyFormat }}
    
    <ion-icon *ngIf="transaccion.image" name="image-outline" class="photo-indicator"></ion-icon>
  </ion-note>
</ion-item>
