<ion-card [ngClass]="tipo">
  <ion-card-header>
    <div class="header-wrapper">
      <ion-icon [name]="icono" [color]="tipo === 'ingreso' ? 'success' : (tipo === 'gasto' ? 'danger' : 'primary')"></ion-icon>
      <ion-card-subtitle>{{ titulo | uppercase }}</ion-card-subtitle>
    </div>
  </ion-card-header>

  <ion-card-content>
    <h2 class="amount">{{ monto | currency:'USD':'symbol':'1.2-2' }}</h2>
  </ion-card-content>
</ion-card>
