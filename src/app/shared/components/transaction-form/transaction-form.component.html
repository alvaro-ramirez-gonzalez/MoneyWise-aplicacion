<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>{{ transaccion.id ? 'Editar' : 'Nueva' }} Transacción</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancelar()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-segment [(ngModel)]="transaccion.type" color="secondary" class="ion-margin-bottom">
    <ion-segment-button value="income">
      <ion-label>Ingreso</ion-label>
    </ion-segment-button>
    <ion-segment-button value="expense">
      <ion-label>Gasto</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list inset="true">
    <ion-item>
      <ion-icon name="cash-outline" slot="start"></ion-icon>
      <ion-label position="stacked">Monto ($)</ion-label>
      <ion-input type="number" [(ngModel)]="transaccion.amount" placeholder="0.00" min="0"></ion-input>
    </ion-item>

    <ion-item>
      <ion-icon name="grid-outline" slot="start"></ion-icon>
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select [(ngModel)]="transaccion.category" placeholder="Seleccione una" okText="Elegir" cancelText="Cancelar">
        <ion-select-option *ngFor="let cat of categorias" [value]="cat.nombre">
          {{ cat.nombre }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-icon name="calendar-outline" slot="start"></ion-icon>
      <ion-label>Fecha</ion-label>
      <ion-datetime-button datetime="date-picker"></ion-datetime-button>
    </ion-item>

    <ion-modal [keepContentsMounted]="true">
      <ng-template>
        <ion-datetime id="date-picker" presentation="date" [(ngModel)]="transaccion.date" [showDefaultButtons]="true" doneText="Confirmar" cancelText="Cerrar"></ion-datetime>
      </ng-template>
    </ion-modal>

    <div class="ion-padding-top ion-text-center">
      <ion-button fill="outline" (click)="capturarFoto()" class="ion-margin-bottom">
        <ion-icon slot="start" name="camera-outline"></ion-icon>
        {{ transaccion.image ? 'Cambiar Comprobante' : 'Subir Comprobante' }}
      </ion-button>
      
      <div *ngIf="transaccion.image" class="image-container">
        <ion-img [src]="transaccion.image" class="preview-img" style="max-height: 200px; border-radius: 8px; overflow: hidden;"></ion-img>
        <ion-button color="danger" fill="clear" size="small" (click)="transaccion.image = ''">
          <ion-icon name="trash-outline" slot="start"></ion-icon> Eliminar foto
        </ion-button>
      </div>
    </div>
  </ion-list>

  <div class="ion-padding">
    <ion-button expand="block" (click)="guardar()" [disabled]="!transaccion.amount || !transaccion.category" shape="round">
      <ion-icon name="save-outline" slot="start"></ion-icon>
      Guardar Transacción
    </ion-button>
  </div>
</ion-content>
